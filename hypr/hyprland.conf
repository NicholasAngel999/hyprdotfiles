ec# Hyprland config file tuned with perfromance and style

####################
### Monitor Conf ###
####################

monitor = eDP-1, 1920x1080@60, 0x0, 1 


#######################
### Set Applications###
#######################

$files = kitty -e yazi
$browser = vivaldi
$menu = wofi --show drun 


################################
### Envionment and Autostart ###
################################

exec-once = waybar &
exec-once = swaylock &
# exec-once = hyprpaper &
exec-once = hypridle
exec-once = dunst

env = XCURSOR_SIZE, 16
env = HYPRCURSOR_SIZE, 16
env = QT_QPA_PLATFORMTHEME, qt5ct


#############
### Input ###
#############

input {
  kb_layout = gb
  follow_mouse = 1
  sensitivity = 0 
}

touchpad {
  natural_scroll = yes
}


#########################
### Gerneal Apperance ###
#########################

general {
  gaps_in = 3
  gaps_out = 7
  border_size = 3
   col.active_border = rgba(cba6f7ee) rgba(a6e3a1ee) 45deg
  col.inactive_border = rgba(444555aa)
  layout = dwindle
}

decoration {
  rounding = 10
  blur {
    enabled = true
    size = 5
    passes = 3
    new_optimizations = true
    ignore_opacity = false
  }
  drop_shadow = yes
  shadow_range = 20
  shadow_render_power = 3
  col.shadow = rgba(00000088)
}

animations {
   enabled = yes
  bezier = easein, 0.25, 0.8, 0.5, 1.0
  animation = windows, 1, 5, easein, popin
  animation = border, 1, 10, default
  animation = fade, 1, 10, default
  animation = workspaces, 1, 6, easein, slide
}

####################
### Window Rules ###
####################

windowrulev2 = float, class:^(rofi)$
windowrulev2 = float, title:^(Volume Control)$
windowrulev2 = size 800 600, title:^(.*Settings.*)$


###################
### Keybindings ###
###################

bind = SUPER, RETURN, exec, kitty
bind = SUPER, Q, killactive,
bind = SUPER, M, exit,
bind = SUPER, E, exec, $files
bind = SUPER, SPACE, exec, $menu
bind = SUPER, F, fullscreen,
bind = SUPER, V, togglefloating, 
bind = SUPER, L, exec, swaylock, 
bind = SUPER, B, exec, $browser


# Workspaces
##############

bind = SUPER, 1, workspace, 1
bind = SUPER, 2, workspace, 2
bind = SUPER, 3, workspace, 3
bind = SUPER, 4, workspace, 4
bind = SUPER, 5, workspace, 5
bind = SUPER, 6, workspace, 6
bind = SUPER, 7, workspace, 7
bind = SUPER, 8, workspace, 8
bind = SUPER, 9, workspace, 9
bind = SUPER, 0, workspace, 10


# Move focused window to workspace 
##################################

bind = SUPER SHIFT, 1, movetoworkspace, 1
bind = SUPER SHIFT, 2, movetoworkspace, 2
bind = SUPER SHIFT, 3, movetoworkspace, 3
bind = SUPER SHIFT, 4, movetoworkspace, 4
bind = SUPER SHIFT, 5, movetoworkspace, 5
bind = SUPER SHIFT, 6, movetoworkspace, 6
bind = SUPER SHIFT, 7, movetoworkspace, 7
bind = SUPER SHIFT, 8, movetoworkspace, 8
bind = SUPER SHIFT, 9, movetoworkspace, 9
bind = SUPER SHIFT, 10, movetoworkspace, 10


# Resize and move windows
############################

bind = SUPER, left, movefocus, l
bind = SUPER, right, movefocus, r
bind = SUPER, up, movefocus, u
bind = SUPER, down, movefocus, d

##############
### Volume ###
##############

bind = ,XF86AudioRaiseVolume, exec, pactl set-sink-volume @DEFAULT_SINK@ +2%
bind = ,XF86AudioLowerVolume, exec, pactl set-sink-volume @DEFAULT_SINK@ -2%
bind = ,XF86AudioMute, exec, pactl set-sink-mute @DEFAULT_SINK@ toggle

##################
### Brightness ###
##################

bind = ,XF86MonBrightnessUp, exec, brightnessctl set +5%
bind = ,XF86MonBrightnessDown, exec, brightnessctl set 5%-


#############################
# Dwindle layout tweaks
#############################
dwindle {
  pseudotile = yes
  preserve_split = yes
}

#############################
# Master layout (optional)
#############################
master {
  new_is_master = true
}

#############################
# Misc
#############################
misc {
  disable_hyprland_logo = true
  mouse_move_enables_dpms = true
  key_press_enables_dpms = true
  animate_manual_resizes = true
  enable_swallow = true
}













