# ============================================
# --- 212th Attack Battalion ---
# Commander Cody Hyprlock
# ============================================

# --- Background ---
background {
    monitor =
    path = ~/hyprdotfiles/wallpapers/cody.png

    blur_passes = 3
    blur_size = 5
    noise = 0.02

    contrast = 1.05
    brightness = 0.65
    vibrancy = 0.15
}

# --- General ---
general {
    disable_loading_bar = true
    hide_cursor = true
}

# --- Input Field ---
input-field {
    monitor =
    size = 260, 50

    outline_thickness = 2

    inner_color = rgba(1a1a18ee)
    outer_color = rgba(c45c1aff)

    font_color = rgba(e8e0d0ff)

    check_color = rgba(d4621eff)
    fail_color  = rgba(a83820ff)

    dots_size = 0.25
    dots_spacing = 0.3
    dots_center = true

    fade_on_empty = false

    placeholder_text = Identification Code

    rounding = 8

    position = 0, -60
    halign = center
    valign = center
}

# --- Clock ---
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%H:%M")"

    font_size = 72
    font_family = Inter Bold

    color = rgba(e8e0d0ff)

    position = 0, 140
    halign = center
    valign = center
}

# --- Date ---
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%A, %d %B")"

    font_size = 20
    font_family = Inter

    color = rgba(7a7268ff)

    position = 0, 80
    halign = center
    valign = center
}
