# ~/.config/hypr/hyprlock.conf
# OSAKA JADE THEME

# --- Background ---
background {
    monitor =
    path = ~/Pictures/wallpapers/blue_starwars.jpg  # <-- Make sure this is your wallpaper path
    blur_passes = 3
    blur_size = 6
    noise = 0.01
    contrast = 1.0
    brightness = 0.75
    vibrancy = 0.2
}

# --- General ---
general {
    disable_loading_bar = true
    hide_cursor = true
}

# --- Input Field ---
input-field {
    monitor =
    size = 280, 45
    outline_thickness = 2
    dots_size = 0.2
    dots_spacing = 0.2
    dots_center = true
    inner_color = rgba(1e1e2eff)
    outer_color = rgba(ff9800ff)
    font_color = rgba(cdd6f4ff)
    check_color = rgba(ffcc80ff)
    fail_color = rgba(f7768eff)
    fade_on_empty = false
    placeholder_text = <span foreground="##737c9f">Password...</span>
    rounding = 20
    position = 0, -50
    halign = center
    valign = center
}

# --- Clock ---
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%I:%M %p")"
    font_size = 80
    font_family = JetBrainsMono Nerd Font Mono Bold
    color = rgba(ff9800ff)
    shadow_passes = 2
    shadow_size = 4
    shadow_color = rgba(0, 0, 0, 0.5)
    position = 0, 120
    halign = center
    valign = center
}

# --- Date ---
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%A, %d %B")"
    font_size = 20
    font_family = JetBrainsMono Nerd Font Mono Bold
    color = rgba(ffcc80ff)
    shadow_passes = 1
    shadow_size = 2
    shadow_color = rgba(0, 0, 0, 0.5)
    position = 0, 40
    halign = center
    valign = center
}
