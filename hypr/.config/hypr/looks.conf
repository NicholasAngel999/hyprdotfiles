#####################
### LOOK AND FEEL ###
#####################
# --- 212th Attack Battalion ---

general {
    gaps_in = 4
    gaps_out = 8
    border_size = 2
    col.active_border   = $cody_orange $cody_orange_soft 45deg
    col.inactive_border = $border_inactive
    resize_on_border = true
    allow_tearing = false
    layout = dwindle
}

decoration {
    rounding = 6
    rounding_power = 2

    active_opacity  = 1.0
    inactive_opacity = 0.92

    shadow {
        enabled      = true
        range        = 12
        render_power = 3
        color        = $shadow_col
    }

    blur {
        enabled    = true
        size       = 4
        passes     = 2
        vibrancy   = 0.1
        new_optimizations = true
    }
}

animations {
    enabled = yes

    bezier = codySnap,   0.05, 0.9, 0.1, 1.05
    bezier = codyFade,   0.5,  0.5, 0.75, 1.0
    bezier = codySlide,  0.23, 1,   0.32, 1
    bezier = linear,     0,    0,   1,    1
    bezier = quick,      0.15, 0,   0.1,  1

    animation = windows,       1, 3,   codySnap
    animation = windowsIn,     1, 3,   codySnap,  popin 80%
    animation = windowsOut,    1, 2,   quick,     popin 80%
    animation = border,        1, 4,   codySlide
    animation = fade,          1, 2.5, codyFade
    animation = fadeIn,        1, 2,   codyFade
    animation = fadeOut,       1, 1.5, codyFade
    animation = layers,        1, 3,   codySlide
    animation = layersIn,      1, 3,   codySnap,  fade
    animation = layersOut,     1, 2,   quick,     fade
    animation = workspaces,    1, 3,   codySlide, slidefade 20%
    animation = workspacesIn,  1, 3,   codySlide, slidefade 20%
    animation = workspacesOut, 1, 2,   quick,     slidefade 20%
}

dwindle {
    pseudotile     = true
    preserve_split = true
}

master {
    new_status = master
}

misc {
    force_default_wallpaper = 0
    disable_hyprland_logo   = true
}
