# ~/.config/hypr/hyprlock.conf

general {
  grace = 0 # asks for password instantly 
  no_fade_in = false
  disable_loading_bar = false
  hide_cursor = true
  ignore_empty_inputs = true
}

background {
  monitor = eDP-1
  path = ~/Pictures/wallpapers/your_wallpaper.jpg
  blur_passes = 4
  blur_size = 8
  noise = 0.04
  contrast = 1.1
  brightness = 0.9
  vibrancy = 0.1
}

input-field {
  monitor = eDP-1
  size = 300, 60
  outline_thickness = 3
  dots_size = 0.25
  dots_spacing = 0.3
  dots_center = true
  outer_color = rgba(cba6f7dd)  # Soft purple outline
  inner_color = rgba(1e1e2edd)  # Background inside input box
  font_color = rgba(a6e3a1ff)   # Pastel green for the password dots
  fade_on_empty = true
  placeholder_text = Password...
  placeholder_color = rgba(999999aa)
  rounding = 16
  shadow_passes = 2
}

label {
  monitor = eDP-1
  text =   Locked
  font_size = 18
  color = rgba(cba6f7ff)
  font_family = JetBrainsMono Nerd Font
  position = 0, -100
}

clock {
  monitor = eDP-1
  format = %H:%M
  font_size = 32
  font_family = JetBrainsMono Nerd Font
  color = rgba(a6e3a1ff)
  position = 0, -160
}
