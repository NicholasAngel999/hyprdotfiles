{
  "layer": "top",
  "position": "top",
  "height": 30,
  "margin": 10,
  "modules-left": [
    "workspaces"
  ],
  "modules-center": [
    "clock"
  ],
  "modules-right": [
    "pulseaudio",
    "battery",
    "network",
    "tray"
  ],
  "workspaces": {
    "format": "{icon}",
    "on-click": "activate",
    "on-scroll-up": "hyprctl dispatch workspace e+1",
    "on-scroll-down": "hyprctl dispatch workspace e-1"
  },
  "clock": {
    "format": " {:%H:%M}"
  },
  "pulseaudio": {
    "format": " {volume}%"
  },
  "battery": {
    "format": "{capacity}% "
  },
  "network": {
    "format-wifi": " {essid}",
    "format-ethernet": "",
    "format-disconnected": "󰖪"
  },
  "tray": {
    "icon-size": 18,
    "spacing": 10
  }
}
