# ============================================
# --- 212th Attack Battalion ---
# Commander Cody Terminal Theme
# ============================================

# --- Font ---
font_family      JetBrainsMono Nerd Font
bold_font        JetBrainsMono Nerd Font Bold
italic_font      JetBrainsMono Nerd Font Italic
bold_italic_font JetBrainsMono Nerd Font Bold Italic
font_size        12.0

# --- Cursor ---
cursor                #c45c1a
cursor_text_color     #1a1a18
cursor_shape          beam
cursor_beam_thickness 1.5

# --- Scrollback ---
scrollback_lines 10000

# --- Window ---
window_padding_width 14
background_opacity   0.92

# --- Base Colours ---
foreground            #e8e0d0
background            #1a1a18
selection_foreground  #1a1a18
selection_background  #c45c1a

# --- Black ---
color0  #1a1a18
color8  #3a3a36

# --- Red ---
color1  #a83820
color9  #c44828

# --- Green (kept functional, muted warm olive) ---
color2  #7a8c5a
color10 #8a9c6a

# --- Yellow / Orange ---
color3  #c45c1a
color11 #d4621e

# --- Blue (desaturated, warm) ---
color4  #5a7a8c
color12 #6a8a9c

# --- Magenta (muted, warm) ---
color5  #8c6a5a
color13 #9c7a6a

# --- Cyan (muted teal) ---
color6  #5a8c7a
color14 #6a9c8a

# --- White ---
color7  #e8e0d0
color15 #f0e8d8

# --- Bell ---
enable_audio_bell no

# --- Tab Bar ---
tab_bar_style           powerline
tab_powerline_style     slanted
tab_bar_background      #1a1a18
active_tab_foreground   #1a1a18
active_tab_background   #c45c1a
inactive_tab_foreground #7a7268
inactive_tab_background #1a1a18
