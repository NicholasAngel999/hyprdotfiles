# ============================================
# --- 212th Attack Battalion ---
# Commander Cody Starship Prompt
# ============================================

add_newline = false

format = """
$directory$git_branch$git_status$cmd_duration
$character
"""

# --- Directory ---
[directory]
style = "bold #c45c1a"
truncation_length = 3
truncate_to_repo = true

# --- Prompt symbol ---
[character]
success_symbol = "[➜](bold #c45c1a)"
error_symbol   = "[➜](bold #a83820)"

# --- Git ---
[git_branch]
symbol = " "
style = "bold #d4621e"

[git_status]
style = "bold #a83820"

# --- Command timing ---
[cmd_duration]
min_time = 500
format = "  [$duration](#8a3e10)"

# --- Disable noise ---
[hostname]
disabled = true

[username]
disabled = true
